services:
  jekyll:
    image: ruby:3.2
    working_dir: /srv/jekyll
    command: >
      bash -lc "
      bundle config set path 'vendor/bundle' &&
      bundle install &&
      bundle exec jekyll serve
        --host 0.0.0.0
        --port 4000
        --watch
        --livereload
        --livereload-port 35729
        --force_polling
      "
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    environment:
      - BUNDLE_GEMFILE=/srv/jekyll/Gemfile